coprocessor:
  url: "<replace>"
  router:
    response:
      condition:
        eq:
          - on_graphql_error: false
          - true
  supergraph:
    response:
      condition:
        eq:
          - on_graphql_error: false
          - true
include_subgraph_errors:
  all: true # Propagate errors (message + extensions) from all subgraphs
