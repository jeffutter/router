[profile.ci]
# Print out output for failing tests as soon as they fail, and also at the end
# of the run (for easy scrollability).
failure-output = "immediate-final"

# Repeat non-pass status at the end so they’re easier to find.
final-status-level = "skip"

# Do not cancel the test run on the first failure.
fail-fast = false

# Each test should take much less than 2 minute
slow-timeout = { period = "30s", terminate-after = 4 }

# Write to output for persistence to CircleCI
[profile.ci.junit]
path = "junit.xml"

# Integration tests require more than one thread. The default setting of 1 will cause too many integration tests to run
# at the same time and causes tests to fail where timing is involved.
# This filter applies only to to the integration tests in the apollo-router package.
[[profile.ci.overrides]]
filter = 'test(/^apollo-router::/)'
threads-required = 4

# ---------------------------------------------------------------------------
# Test groups: serialize tests that mutate process-wide state.
#
# Test groups are profile-independent and apply to every profile (default, ci,
# coverage, etc.).  Each group caps concurrent execution of its members; we use
# `max-threads = 1` to mean "run these tests one at a time across the entire
# nextest run, including across separate `tests/*.rs` integration binaries".
#
# Why groups instead of per-file `static TEST: Mutex<()>` locks:
#   * Each `tests/*.rs` integration test compiles to its own binary, so an
#     intra-binary mutex cannot serialize across binaries.  The Apollo OTLP
#     trio (`apollo_reports`, `apollo_otel_traces`, `apollo_otel_http_proxy`)
#     all install process-wide OpenTelemetry tracer/meter providers and were
#     stomping each other when nextest scheduled them concurrently.
#   * Groups also let us drop the blanket `threads-required = 4` for these
#     binaries (which previously starved CI by reserving the whole 4-vCPU
#     runner per test), allowing other apollo-router tests to fill the box.
#
# We *keep* the in-source `static TEST` mutex inside `apollo-router`'s lib
# unit tests (`plugins::telemetry::*`) because contributors running plain
# `cargo test -p apollo-router` (without nextest) still need that path to be
# safe -- `cargo test` does not honour these test-groups.
# ---------------------------------------------------------------------------
[test-groups]
# Apollo telemetry integration binaries that share OTel global state and
# Apollo Studio mock collectors.
serial-apollo-telemetry-integration = { max-threads = 1 }
# In-process Apollo metrics unit tests that clobber the global meter provider.
serial-apollo-metrics-unit = { max-threads = 1 }
# Prometheus telemetry unit tests that race on the global Prometheus registry
# pointer and the global tracer provider via `Telemetry::activate()`.
serial-prometheus-telemetry-unit = { max-threads = 1 }

[[profile.default.overrides]]
filter = '''
   binary_id(=apollo-router::apollo_reports)
or binary_id(=apollo-router::apollo_otel_traces)
or binary_id(=apollo-router::apollo_otel_http_proxy)
'''
test-group = 'serial-apollo-telemetry-integration'

[[profile.default.overrides]]
filter = 'binary_id(=apollo-router) & test(/^plugins::telemetry::metrics::apollo::test::apollo_metrics_/)'
test-group = 'serial-apollo-metrics-unit'

[[profile.default.overrides]]
filter = 'binary_id(=apollo-router) & test(/^plugins::telemetry::tests::it_test_prometheus_metrics/)'
test-group = 'serial-prometheus-telemetry-unit'

# Drop `threads-required = 4` (inherited from the apollo-router::* override
# above) for the telemetry integration binaries.  The group caps concurrency
# globally to 1, so reserving 4 threads per test only wastes capacity.
[[profile.ci.overrides]]
filter = '''
   binary_id(=apollo-router::apollo_reports)
or binary_id(=apollo-router::apollo_otel_traces)
or binary_id(=apollo-router::apollo_otel_http_proxy)
'''
threads-required = 1
